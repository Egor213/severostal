name: todolist

services:
  psql:
    env_file:
      - .env
    image: postgres:16-alpine
    volumes:
      - todolist_pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    restart: unless-stopped
    container_name: psql
    networks:
      - todolist_backend

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "80:80"
    depends_on:
      - psql
    networks:
      - todolist_backend

volumes:
  todolist_pgdata:

networks:
  todolist_backend:
    driver: bridge
    name: todolist_network