name: todolist

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - todolist_prometheusdata:/prometheus
    networks:
      - todolist_backend

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - todolist_grafanadata:/var/lib/grafana
    networks:
      - todolist_backend


volumes:
  todolist_grafanadata:
  todolist_prometheusdata:

networks:
  todolist_backend:
    driver: bridge